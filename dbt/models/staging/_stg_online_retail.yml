version: 2

models:
  - name: stg_online_retail
    description: One row per invoice line item, typed and renamed from the bronze source.
    columns:
      - name: invoice_line_id
        description: Surrogate key hashed from invoice_id, product_code, invoice_at and quantity.
        data_tests:
          - unique
          - not_null
      - name: invoice_id
        data_tests:
          - not_null
      - name: product_code
        data_tests:
          - not_null
